<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>
        Perfil Usuario
    </title>
    <link
        rel="stylesheet"
        href="css/style.css"
    >
</head>
<body>
<div class="app">
    <button
        onclick="history.back()"
        style="
            position:fixed;
            top:15px;
            right:15px;
            z-index:999;
            padding:10px;
            border:none;
            border-radius:50%;
            cursor:pointer;
        "
    >
        ✖
    </button>
    <section
        class="perfil-card"
        style="
            text-align:center;
            padding:20px;
        "
    >
        <img
            id="fotoUsuario"
            src="img/default.png"
            style="
                width:150px;
                height:150px;
                border-radius:50%;
                object-fit:cover;
                box-shadow:0 0 25px #7c4dff;
                margin-bottom:20px;
            "
        >
        <h1
            id="nombreUsuario"
            style="
                font-size:45px;
                margin-bottom:20px;
            "
        >
            Cargando...
        </h1>
        <p
            style="
                font-size:25px;
                margin:15px;
            "
        >
            🎓 Carrera:
            <span id="carreraUsuario">
                No especificada
            </span>
        </p>
        <p
            style="
                font-size:25px;
                margin:15px;
            "
        >
            📚 Materias:
            <span id="materiasUsuario">
                Ninguna
            </span>
        </p>
        <p
            style="
                font-size:25px;
                margin:15px;
            "
        >
            📖 Semestre:
            <span id="semestreUsuario">
                No especificado
            </span>
        </p>
        <div
            style="
                display:flex;
                justify-content:center;
                gap:20px;
                margin-top:30px;
            "
        >
            <button id="btnAgregarAmigo">
                ➕ Agregar amigo
            </button>
            <button id="btnMensaje">
                💬 Mensaje
            </button>
        </div>
        <hr
            style="
                margin-top:40px;
                border:1px solid #263869;
            "
        >
    </section>
    <section>
        <h2
            style="
                margin-top:40px;
                font-size:35px;
            "
        >
            📝 Publicaciones
        </h2>
        <div id="publicacionesUsuario">
        </div>
    </section>
</div>
<script src="js/app.js"></script>
</body>
</html>
