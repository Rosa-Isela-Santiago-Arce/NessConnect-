<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inicio - 💙NessConnect</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <header class="topbar">

        <h2> NessConnect</h2>

        <a href="perfil.html" class="perfil-mini">
            👤
        </a>

    </header>

    <div class="busqueda">

        <input
            type="text"
            id="buscador"
            placeholder="Buscar jugadores o juegos..."
        >

    </div>

    <section class="estado-juego">

        <h3>Nessie</h3>

        <div class="card-juego">

            <h4>La amistad comienza con un rugidito.</h4>

            <p>
                Un pequeño guardián de grandes aventuras
            </p>

        </div>

    </section>

    <!-- CREAR PUBLICACIÓN -->

    <section class="crear-post">

        <input
            type="text"
            id="tituloPublicacion"
            placeholder="Título de la publicación"
        >

        <br><br>

        <textarea
            id="contenidoPublicacion"
            placeholder="¿Qué estás pensando?"
        ></textarea>

        <br><br>

        <input
            type="file"
            id="archivoPublicacion"
        >

        <br><br>

        <button id="btnPublicar">
            Publicar
        </button>

    </section>

    <!-- PUBLICACIONES -->

    <section class="feed" id="feed">

        <div class="post">

            <h4>Nessie 👾</h4>

            <p id="pensamiento">
                Pensando...
            </p>

        </div>

    </section>

    <!-- NESSIE -->

    <div id="nessie">

        <img
            id="nessieImagen"
            src="img/nessie_salta.gif"
            alt="Nessie"
        >

    </div>

    <!-- MENU -->

    <nav class="menu-inferior">

        <a href="inicio.html">
            🏠
        </a>

        <a
            href="mensajes.html"
            class="icono-menu"
        >

            💬

            <span
                id="puntoMensajes"
                class="punto-rojo"
            ></span>

        </a>

        <a href="nova.html">
            👾
        </a>

        <a
            href="perfil.html"
            class="icono-menu"
        >

            👤

            <span
                id="puntoSolicitudes"
                class="punto-rojo"
            ></span>

        </a>

    </nav>

</div>

<script src="js/app.js"></script>

<script src="js/nessie.js"></script>

</body>
</html>
